version: "3.9"

# ─────────────────────────────────────────────────────────────
# MAS Pipeline Sentinel — Local Development Stack
# ─────────────────────────────────────────────────────────────
# Services:
#   kafka + zookeeper  → Message bus (agent communication)
#   kafka-ui           → Kafka topic browser (port 8080)
#   postgres           → Agent state store
#   orchestrator       → Main orchestrator agent
#   ingestion-monitor  → Ingestion anomaly agent
#   schema-watcher     → Schema drift agent
#   quality-auditor    → dbt test quality agent
#   lineage-impact     → dbt DAG blast radius agent
#   remediation        → Auto-remediation agent
# ─────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mas_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mas_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mas_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mas-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:15-alpine
    container_name: mas_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mas_sentinel
      POSTGRES_USER: mas_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mas_user -d mas_sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Agents ─────────────────────────────────────────────────
  # Uncomment when each agent is implemented

  # orchestrator:
  #   build:
  #     context: .
  #     dockerfile: agents/orchestrator/Dockerfile
  #   container_name: mas_orchestrator
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   env_file: .env
  #   restart: unless-stopped

  # ingestion-monitor:
  #   build:
  #     context: .
  #     dockerfile: agents/ingestion_monitor/Dockerfile
  #   container_name: mas_ingestion_monitor
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   env_file: .env
  #   restart: unless-stopped

volumes:
  postgres_data:
